# Ring the bell if any background window rang a bell
set -g bell-action any

# Default termtype. If the rcfile sets $TERM, that overrides this value.
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Keep your finger on ctrl, or don't
bind-key ^D detach-client

# Create splits and vertical splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane resize in all four directions using vi bindings.
# Can use these raw but I map them to shift-ctrl-<h,j,k,l> in Ghostty.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Smart pane switching with awareness of vim splits.
# Source: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

# Use vi keybindings for tmux commandline input.
# Note that to get command mode you need to hit ESC twice...
set -g status-keys vi

# Use vi keybindings in copy and choice modes
setw -g mode-keys vi

# easily toggle synchronization (mnemonic: e is for echo)
# sends input to all panes in a given window
bind e setw synchronize-panes on
bind E setw synchronize-panes off

# set first window to index 1 (not 0) to map more to the keyboard layout...
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Status update interval
set -g status-interval 1

# Patch for OS X pbpaste and pbcopy under tmux.
bind-key -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Reset pane sizes on attach
set-window-option -g aggressive-resize

# Screen like binding
unbind C-b
set -g prefix C-a
bind a send-prefix

# No escape time for vi mode
set -sg escape-time 0

# Screen like binding for last window
unbind l
bind C-a last-window

# Bigger history
set -g history-limit 10000

# New windows/pane in $PWD
bind c new-window -c "#{pane_current_path}"

# Renumber windows when they are killed to satisfy my OCD
set-option -g renumber-windows on

# Fix key bindings broken in tmux 2.1
set -g assume-paste-time 0

# tmux scroll is annoying, maybe one day I'll break this habit?
set-option -g mouse on

# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Render markdown from clipboard in popup
bind m display-popup -E -w 80% -h 80% "pbpaste | glow -s ~/.config/glow/onedark.json -p"

# Render markdown file in popup (prompts for path with tab completion)
bind M command-prompt -p "Markdown file:" -I "#{pane_current_path}/" "display-popup -E -w 80% -h 80% 'glow -s ~/.config/glow/onedark.json -p %%'"

# Fuzzy find and view file (markdown via glow, everything else via bat)
bind f display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "~/.dotfiles/tmux/tmux-view-file.sh"

#

#
# Catppuccin Theme (via TPM)
# To revert: uncomment the old theme block above and remove this section
#

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "default"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_right_separator "█"
set -g @catppuccin_pane_active_border_style "fg=blue"

set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{E:@catppuccin_status_session}"
set -g status-right ""
if-shell '[ -n "$SSH_CLIENT" ] || [ -n "$SSH_TTY" ]' \
  'set -ga status-right "#[fg=white] 󰅟 "'
set -ga status-right "#{E:@catppuccin_status_date_time}"

#
# TPM - Tmux Plugin Manager
# Install: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press prefix + I to install plugins
#

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
# To use custom OneDark powerline theme instead of catppuccin:
# 1. Comment out the catppuccin plugin line above
# 2. Uncomment the line below
# source-file ~/.dotfiles/tmux/tmux-onedark-powerline/onedark-powerline.conf

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
